name: release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gleam-version: ["1.14.0", "1.17.0"]

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          gleam-version: ${{ matrix.gleam-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - run: |
          version="v$(cat gleam.toml | grep -m 1 "version" | sed -r "s/version *= *\"([[:digit:].]+)\"/\1/")"
          if [ "$version" != "${{ github.ref_name }}" ]; then
            echo "tag '${{ github.ref_name }}' does not match the version in gleam.toml"
            echo "expected a tag name '$version'"
            exit 1
          fi
        name: check version

      - if: matrix.gleam-version == '1.17.0'
        run: gleam format --check

      - run: gleam test --target erlang
      - run: gleam test --target javascript

  publish:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          gleam-version: "1.17.0"

      - run: gleam publish -y
        env:
          HEXPM_API_KEY: ${{ secrets.HEX_API_KEY }}

      - uses: softprops/action-gh-release@v1
